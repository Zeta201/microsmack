apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: github-events
  namespace: argo-events
spec:
  service:
    ports:
      - port: 12000
        targetPort: 12000
    type: ClusterIP
  github:
    # Push event for dev workflow
    push-event:
      owner: Zeta201
      repository: smack
      events:
        - push
      apiToken:
        name: github-secret
        key: token
      webhook:
        endpoint: /push
        port: "12000"

    # Pull request event for prod workflow
    pull-request-event:
      owner: Zeta201
      repository: smack
      events:
        - pull_request
      apiToken:
        name: github-secret
        key: token
      webhook:
        endpoint: /pull-request
        port: "12000"

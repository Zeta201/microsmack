apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: github-events
  namespace: argo-events
spec:
  service:
    ports:
      - port: 12000
        targetPort: 12000
  github:
    webhook:
      # Dev workflow trigger
      - name: push-event
        endpoint: /push
        port: "12000"
        events:
          - push
        apiToken:
          name: github-secret
          key: token
        owner: Zeta201
        repository: microsmack

      # Prod workflow trigger
      - name: pull-request-event
        endpoint: /pull-request
        port: "12000"
        events:
          - pull_request
        apiToken:
          name: github-secret
          key: token
        owner: Zeta201
        repository: microsmack
